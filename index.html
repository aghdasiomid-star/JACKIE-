<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackie</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            color: #333;
        }

        .card {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: 40px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .dog {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .button {
            display: block;
            margin: 15px auto;
            padding: 15px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            background: #28a745;
            font-size: 18px;
        }

        .whatsapp {
            background: #25D366;
        }
    </style>

</head>

<body>

<div class="card">

    <img class="dog" src="jackie.jpg">

    <h1>JACKIE</h1>

    <p>
        Hello, my name is Jackie 🐾<br>
        I have a family.<br>
        If you found me, please contact my owner.
    </p>


    <a class="button" href="tel:+989122337376">
        CALL OWNER
    </a>


    <a class="button whatsapp" href="https://wa.me/989122337376">
        WHATSAPP
    </a>


</div>

</body>
</html>
